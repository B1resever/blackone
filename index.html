<!DOCTYPE html>
<html>
<head>
  <title>BLACK ONE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #f5d76e;
      background: black;
    }

    .hero {
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9)),
        url('escalade-miami.jpg') center/cover no-repeat;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 25px 60px;
    }

    .brand-logo {
      height: 60px;
    }

    .menu a {
      color: gold;
      margin-left: 30px;
      text-decoration: none;
    }

    .center {
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 90px;
      letter-spacing: 10px;
      animation: glow 6s infinite alternate;
      position: relative;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px gold; }
      to { text-shadow: 0 0 60px gold; }
    }

    h1::after {
      content: "";
      position: absolute;
      left: -120%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, white, transparent);
      animation: shine 40s infinite;
    }

    @keyframes shine {
      0% { left: -120%; }
      5% { left: 120%; }
      100% { left: 120%; }
    }

    .membership {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(0,0,0,0.7);
      border: 1px solid gold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: black;
      color: gold;
      border: 1px solid rgba(255,255,255,0.2);
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      background: gold;
      color: black;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="hero">

  <div class="navbar">
    <img src="logo.png" class="brand-logo">
    <div class="menu">
      <a href="index.html">Home</a>
      <a href="reserve.html">Reserve</a>
    </div>
  </div>

  <div class="center">
    <h1>BLACK ONE</h1>
    <h2>Ultra Luxury Mobility</h2>
  </div>

  <div class="membership">
    <h3>Membership Access</h3>

    <select>
      <option>Gold ($200/month - 20%)</option>
      <option>Diamond ($500/month - 35%)</option>
    </select>

    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">

    <button onclick="window.location.href='reserve.html'">
      Continue to Reserve
    </button>

  </div>

</div>

</body>
</html>
