<!DOCTYPE html>
<html>
<head>
  <title>BLACK ONE</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: black;
      color: gold;
    }

    /* NAVBAR */
    .navbar {
      position: absolute;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      box-sizing: border-box;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 50px;
      filter: drop-shadow(0 0 20px rgba(245,215,110,0.7));
    }

    .menu {
      display: flex;
      gap: 40px;
    }

    .menu a {
      color: gold;
      text-decoration: none;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1617814076367-b759c7d7e738?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 70px;
      margin: 0;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(245,215,110,0.5);
    }

    h2 {
      margin-top: 10px;
      font-weight: 300;
    }

    p {
      opacity: 0.8;
    }

    /* FORM */
    .booking {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    .booking-box {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border: 1px solid gold;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .booking-box input,
    .booking-box select {
      padding: 10px;
      border: none;
      background: black;
      color: gold;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
    }

    .booking-box button {
      background: gold;
      color: black;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    /* MEMBERSHIP */
    .membership {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      <!-- CAMBIE ESTE NOMBRE SI SU ARCHIVO ES DIFERENTE -->
      <img src="logo.png">
    </div>

    <div class="menu">
      <a href="#">Home</a>
      <a href="#">Membership</a>
      <a href="#">Fleet</a>
      <a href="#">Reserve</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>BLACK ONE</h1>
      <h2>Ultra Luxury Mobility</h2>
      <p>Experience the future of premium transportation</p>

      <!-- FORM -->
      <div class="booking">
        <div class="booking-box">
          <select>
            <option>Gold</option>
            <option>Diamond</option>
          </select>

          <input type="text" placeholder="Name">
          <input type="email" placeholder="Email">
          <input type="date">
          <input type="date">

          <button>Reserve</button>
        </div>
      </div>

      <div class="membership">
        Membership unlocks priority booking, elite fleet access & VIP experiences.
      </div>

    </div>
  </div>

</body>
</html>
