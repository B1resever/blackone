<!DOCTYPE html>
<html>
<head>
  <title>BLACK ONE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: gold;
      background: black;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.70), rgba(0,0,0,0.90)),
        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      width: 100%;
      padding: 24px 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 3px;
      color: gold;
    }

    .menu {
      display: flex;
      gap: 35px;
      padding-right: 10px;
    }

    .menu a {
      color: gold;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .menu a:hover {
      color: white;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 120px 20px 40px;
      animation: fadeIn 1.6s ease;
    }

    h1 {
      font-size: 72px;
      letter-spacing: 7px;
      margin: 0;
      color: gold;
    }

    h2 {
      font-size: 24px;
      font-weight: 300;
      margin: 25px 0 0;
      color: #d4af37;
    }

    p {
      font-size: 18px;
      margin: 18px 0 0;
      color: #f1d77a;
    }

    .btn {
      margin-top: 45px;
      display: inline-block;
      padding: 16px 46px;
      border: 1px solid gold;
      color: gold;
      text-decoration: none;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .btn:hover {
      background: gold;
      color: black;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 18px 25px;
      }

      .menu {
        gap: 14px;
      }

      .menu a {
        font-size: 12px;
      }

      h1 {
        font-size: 44px;
        letter-spacing: 4px;
      }

      h2 {
        font-size: 20px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <section class="hero">

    <nav class="navbar">
      <div class="logo">BLACK ONE</div>

      <div class="menu">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Fleet</a>
        <a href="#">Contact</a>
      </div>
    </nav>

    <div class="content">
      <h1>BLACK ONE</h1>
      <h2>Ultra Luxury Mobility</h2>
      <p>Private executive transportation for those who move differently.</p>

      <a href="#" class="btn">Reserve Soon</a>
    </div>

  </section>
</body>
</html>
