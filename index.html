<!DOCTYPE html>
<html>
<head>
  <title>BLACK ONE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #f5d76e;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.9)),
        url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2'); /* SUV luxury night */

      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 80px;
    }

    .logo {
      font-weight: bold;
      letter-spacing: 4px;
      font-size: 18px;
    }

    .menu a {
      color: #f5d76e;
      margin-left: 30px;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* HERO CONTENT */
    .center {
      text-align: center;
      margin-top: -60px;
      animation: fadeIn 1.8s ease;
    }

    h1 {
      font-size: 80px;
      letter-spacing: 8px;
      margin: 0;
    }

    h2 {
      margin-top: 15px;
      font-weight: 300;
      color: #fff2b0;
    }

    p {
      margin-top: 15px;
      font-size: 16px;
      color: #e8d88a;
    }

    .btn {
      margin-top: 30px;
      padding: 14px 40px;
      border: 1px solid #f5d76e;
      color: #f5d76e;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
    }

    .btn:hover {
      background: #f5d76e;
      color: black;
    }

    /* FLOATING FORM (LUXURY STYLE) */
    .form-box {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 950px;

      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(245,215,110,0.3);
      border-radius: 14px;

      padding: 18px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .form-box input,
    .form-box select {
      background: #0c0c0c;
      border: 1px solid rgba(245,215,110,0.3);
      color: white;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .form-box button {
      background: #f5d76e;
      border: none;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .form-box button:hover {
      background: white;
    }

    /* ANIMACIÓN */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* MOBILE */
    @media (max-width: 900px) {
      h1 { font-size: 40px; }

      .form-box {
        grid-template-columns: 1fr;
        bottom: 10px;
      }

      .navbar {
        padding: 20px;
      }

      .menu {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="hero">

    <div class="navbar">
      <div class="logo">BLACK ONE</div>

      <div class="menu">
        <a href="#">Home</a>
        <a href="#">Membership</a>
        <a href="#">Fleet</a>
        <a href="#">Contact</a>
      </div>
    </div>

    <div class="center">
      <h1>BLACK ONE</h1>
      <h2>Ultra Luxury Mobility</h2>
      <p>Cadillac Escalade • Private Chauffeur • Miami Elite Transport</p>

      <a href="#" class="btn">Reserve Now</a>
    </div>

    <!-- FORM ULTRA LUXURY -->
    <div class="form-box">
      <select>
        <option>Gold</option>
        <option>Diamond</option>
      </select>

      <input type="text" placeholder="Name">
      <input type="email" placeholder="Email">
      <input type="text" placeholder="From">
      <input type="text" placeholder="To">

      <button>Go</button>
    </div>

  </div>

</body>
</html>
