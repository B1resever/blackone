<!DOCTYPE html>
<html>
<head>
  <title>BLACK ONE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: #f5d76e;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.88)),
        url('escalade-miami.jpg') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 60px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      z-index: 5;
    }

    .brand-logo {
      height: 58px;
      filter: drop-shadow(0 0 25px rgba(245,215,110,0.7));
    }

    .menu a {
      color: #f5d76e;
      text-decoration: none;
      margin-left: 35px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .content {
      text-align: center;
      padding: 80px 20px 40px;
      z-index: 2;
      animation: fadeIn 1.6s ease;
    }

    h1 {
      font-size: 92px;
      letter-spacing: 10px;
      margin: 0;
      color: #f5d76e;
      position: relative;
      text-shadow: 0 0 30px rgba(245,215,110,0.55);
      animation: luxuryGlow 3s infinite alternate;
    }

    h1::after {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 80%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.75), transparent);
      animation: shine 4s infinite;
    }

    h2 {
      margin-top: 14px;
      font-size: 25px;
      font-weight: 300;
      color: #fff1a6;
    }

    .subtitle {
      color: #f1df9a;
      font-size: 16px;
      margin-top: 14px;
    }

    .moving-line {
      width: 220px;
      height: 2px;
      background: linear-gradient(90deg, transparent, gold, transparent);
      margin: 28px auto;
      animation: pulseLine 2s infinite;
    }

    .car-light {
      position: absolute;
      bottom: 170px;
      left: -250px;
      width: 220px;
      height: 4px;
      background: linear-gradient(90deg, transparent, #f5d76e, white, #f5d76e, transparent);
      filter: blur(2px);
      animation: carMove 6s infinite;
      opacity: 0.8;
    }

    .booking {
      width: 88%;
      max-width: 1050px;
      margin: 0 auto 38px;
      padding: 18px;
      background: rgba(0,0,0,0.68);
      border: 1px solid rgba(245,215,110,0.5);
      border-radius: 16px;
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 120px;
      gap: 10px;
      z-index: 3;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
    }

    .booking input,
    .booking select {
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(245,215,110,0.35);
      color: white;
      padding: 13px;
      border-radius: 8px;
      font-size: 13px;
    }

    .booking button {
      background: #f5d76e;
      border: none;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .booking button:hover {
      background: white;
    }

    .membership-note {
      text-align: center;
      color: #e8d88a;
      font-size: 13px;
      margin-bottom: 25px;
      z-index: 3;
    }

    @keyframes shine {
      0% { left: -120%; }
      45% { left: 130%; }
      100% { left: 130%; }
    }

    @keyframes luxuryGlow {
      from { text-shadow: 0 0 18px rgba(245,215,110,0.4); }
      to { text-shadow: 0 0 45px rgba(245,215,110,0.9); }
    }

    @keyframes pulseLine {
      0%,100% { opacity: 0.35; transform: scaleX(0.7); }
      50% { opacity: 1; transform: scaleX(1.1); }
    }

    @keyframes carMove {
      0% { left: -250px; opacity: 0; }
      20% { opacity: 1; }
      70% { opacity: 1; }
      100% { left: 110%; opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .navbar {
        padding: 18px 22px;
      }

      .brand-logo {
        height: 42px;
      }

      .menu {
        display: none;
      }

      h1 {
        font-size: 46px;
        letter-spacing: 5px;
      }

      h2 {
        font-size: 20px;
      }

      .booking {
        grid-template-columns: 1fr;
        width: 92%;
      }

      .booking button {
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <nav class="navbar">
      <img src="logo.png" class="brand-logo" alt="BLACK ONE">
      <div class="menu">
        <a href="#">Home</a>
        <a href="#">Membership</a>
        <a href="#">Fleet</a>
        <a href="#">Reserve</a>
      </div>
    </nav>

    <div class="car-light"></div>

    <div class="content">
      <h1>BLACK ONE</h1>
      <h2>Ultra Luxury Mobility</h2>
      <div class="moving-line"></div>
      <p class="subtitle">Cadillac Escalade • Miami Bay • Private Executive Chauffeur</p>
    </div>

    <div>
      <div class="booking">
        <select>
          <option>Gold Membership</option>
          <option>Diamond Membership</option>
        </select>

        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="From">
        <input type="text" placeholder="To">

        <button>Reserve</button>
      </div>

      <div class="membership-note">
        Gold & Diamond members receive priority reservations, VIP benefits, and elite fleet access.
      </div>
    </div>

  </section>

</body>
</html>
