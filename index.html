<!DOCTYPE html>
<html>
<head>
  <title>BLACK ONE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: gold;
      text-align: center;

      /* Fondo premium */
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
      url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');

      background-size: cover;
      background-position: center;
    }

    .container {
      padding-top: 140px;
    }

    h1 {
      font-size: 56px;
      letter-spacing: 4px;
    }

    h2 {
      font-weight: 300;
      margin-top: 10px;
      color: #d4af37;
    }

    p {
      margin-top: 20px;
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 40px;
      display: inline-block;
      padding: 14px 40px;
      border: 1px solid gold;
      color: gold;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: gold;
      color: black;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>BLACK ONE</h1>
    <h2>Ultra Luxury Mobility</h2>
    <p>Experience the future of premium transportation</p>

    <a href="#" class="btn">Coming Soon</a>
  </div>
</body>
</html>
